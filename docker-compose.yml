services:

  # ── Redis (Celery broker + result backend) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MLflow tracking server ───────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5002:5002"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5002
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5002
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
      - ./results:/app/results
      - ./mlruns:/app/mlruns
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  # ── Celery worker ────────────────────────────────────────────────────────────
  worker:
    build: .
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5002
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
      - ./results:/app/results
      - ./mlruns:/app/mlruns
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  streamlit:
    build: .
    ports:
      - "8502:8502"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8001
    volumes:
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
      - ./results:/app/results
    command: streamlit run frontend/streamlit_app.py --server.port 8502 --server.address 0.0.0.0
    depends_on:
      - api
